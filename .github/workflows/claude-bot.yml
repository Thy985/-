name: PR @claude 自动执行任务

on:
  push:
    branches: [main]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  ai-task:
    runs-on: ubuntu-latest
    # push 事件直接运行；评论事件需要包含 @claude
    if: github.event_name == 'push' || contains(github.event.comment.body, '@claude')
    steps:
      - name: 获取完整仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置环境变量和Claude接口
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: "https://api.deepseek.com/anthropic"
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.DEEPSEEK_API_KEY }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: deepseek-chat
